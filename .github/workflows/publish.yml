name: Publish to PyPI

on:
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # Required for trusted publishing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify release tag matches pyproject version
        run: |
          python -m pip install --upgrade pip tomli || true
          PROJ_VER=$(python -c "import tomllib,sys; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])" \
                     2>/dev/null || python -c "import tomli,sys; print(tomli.load(open('pyproject.toml','rb'))['project']['version'])")
          TAG="${GITHUB_REF_NAME#v}"
          echo "pyproject version: $PROJ_VER"
          echo "release tag:       $GITHUB_REF_NAME (normalised: $TAG)"
          if [ "$PROJ_VER" != "$TAG" ]; then
            echo "::error::Release tag '$GITHUB_REF_NAME' does not match pyproject version '$PROJ_VER'. Aborting publish."
            exit 1
          fi

      - name: Clean
        run: rm -rf dist build *.egg-info

      - name: Install build tools
        run: pip install build --upgrade pip build twine

      - name: Build package
        run: python -m build

      - name: Check package
        run: python -m twine check dist/*      

      - name: Show dist contents
        run: ls -lh dist      

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.12.4
        with:
          attestations: false
          verbose: true