name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check pyirena

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.11', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install matplotlib  # needed by some non-GUI tests

      - name: Run tests
        run: pytest --cov=pyirena --cov-report=term

  test-gui:
    # Runs the suite with the optional GUI extras installed so the tests that
    # otherwise skip in the `test` job (periodictable / xraydb / Dans_Diffraction
    # and the Qt-backed panels) actually execute here.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install headless Qt system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0

      - name: Install dependencies (with GUI extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,gui]"

      - name: Run tests (offscreen Qt)
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest --cov=pyirena --cov-report=term
