{% set name = "pyirena" %}
{% set version = "1.1.0b2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/jilavsky/{{ name }}/archive/v{{ version }}.tar.gz
  # sha256 of the release tarball above. Fill in at release time, e.g.:
  #   curl -sL <url> | shasum -a 256
  # (see docs/distribution.md). Kept as a Jinja variable so a forgotten value
  # fails `conda build` loudly rather than shipping a wrong/blank checksum.
  sha256: {{ sha256 }}

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools >=77.0
    - wheel
  run:
    - python >=3.9
    - numpy >=2.0
    - scipy >=1.8.0
    - h5py >=3.0.0
    - igor2 >=0.5.13

test:
  imports:
    - pyirena
    - pyirena.core
    - pyirena.io
  commands:
    - pip check
  requires:
    - pip
    - pytest
  source_files:
    - pyirena/tests

about:
  home: https://github.com/jilavsky/pyirena
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Python tools for small-angle scattering data analysis
  description: |
    pyIrena provides comprehensive tools for analyzing SAXS/SANS/USAXS data,
    including the Unified Fit model (Beaucage method) for hierarchical structures.
  doc_url: https://github.com/jilavsky/pyirena#readme
  dev_url: https://github.com/jilavsky/pyirena

extra:
  recipe-maintainers:
    - jilavsky
