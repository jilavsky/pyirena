name: pyirena

# IMPORTANT — install architecture
#
# conda installs Python + the heavy compiled scientific stack only.
# pip (via the `-e ".[gui]"` line below) installs PySide6, shiboken6,
# pyqtgraph, and the other GUI-side dependencies.
#
# Do NOT add `pyside6`, `shiboken6`, or `pyqtgraph` as conda dependencies
# here. Mixing conda-built and pip-built Qt6 binaries in one env produces
# `ImportError: DLL load failed ... The specified procedure could not be
# found` on Windows when shiboken6 from one version meets Qt6 DLLs from
# another. Letting pip install the entire Qt stack guarantees matched
# binaries.
#
# Python is capped <3.14 because Python 3.14 (released Oct 2025) is still
# bleeding edge for compiled binding wheels. Bump the cap once the
# ecosystem catches up.

channels:
  - conda-forge
  - defaults

dependencies:
  # Python (cap below 3.14 — see note above)
  - python>=3.10,<3.14

  # Core scientific stack — conda gives faster, pre-built binaries than pip
  - numpy>=1.20
  - scipy>=1.7
  - h5py>=3.0
  - matplotlib>=3.3

  # Development / testing (optional — remove if not needed)
  - pytest>=7.0
  - pytest-cov

  # Everything GUI- and Qt-related comes via pip below
  - pip
  - pip:
      # `-e ".[gui]"` installs pyirena in editable mode and pulls
      # PySide6, pyqtgraph, xraydb, periodictable, Dans-Diffraction
      # from PyPI — see `gui` extras in pyproject.toml.
      - -e ".[gui]"
      # AI advisor deps (installed with the GUI extra; listed explicitly so
      # conda-managed envs get them without a separate pip install step)
      - anthropic>=0.40.0
      - openai>=1.0.0
      - keyring>=24.0
